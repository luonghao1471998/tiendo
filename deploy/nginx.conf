# ─────────────────────────────────────────────────────────────────────────────
# TienDo — Nginx config
# Thay YOUR_DOMAIN bằng domain thực (VD: app.tiendo.vn)
# Thay /var/www/tiendo bằng đường dẫn deploy thực nếu khác
# ─────────────────────────────────────────────────────────────────────────────

# Redirect HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN www.YOUR_DOMAIN;

    # Let's Encrypt challenge (Certbot tự thêm)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# Main HTTPS server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name YOUR_DOMAIN www.YOUR_DOMAIN;

    root /var/www/tiendo/public;
    index index.php;

    # ── SSL (Certbot sẽ tự điền vào) ────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Security headers ─────────────────────────────────────────────────────
    add_header X-Frame-Options           "SAMEORIGIN"  always;
    add_header X-Content-Type-Options    "nosniff"     always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

    # ── Gzip ────────────────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml image/svg+xml;
    gzip_min_length 1024;

    # ── Upload limits (PDF 50MB + ảnh) ──────────────────────────────────────
    client_max_body_size 60M;

    # ── React SPA static assets ──────────────────────────────────────────────
    location /assets/ {
        alias /var/www/tiendo/public/assets/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Tile images (cached aggressively) ────────────────────────────────────
    # Tiles được serve qua Laravel (auth check) nên không serve static trực tiếp
    # Cache-Control header được Laravel set: max-age=86400

    # ── API routes → Laravel ─────────────────────────────────────────────────
    location /api/ {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ── Public share route (KHÔNG block bằng auth) ───────────────────────────
    location /share/ {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ── PHP-FPM 8.2 (TienDo) ─────────────────────────────────────────────────
    location ~ \.php$ {
        fastcgi_pass   unix:/run/php/php8.2-fpm-tiendo.sock;
        fastcgi_index  index.php;
        fastcgi_param  SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include        fastcgi_params;
        fastcgi_read_timeout 120;

        # Security: chặn execute PHP trong storage/uploads
        location ~ ^/(storage|bootstrap/cache) {
            deny all;
        }
    }

    # ── React SPA fallback (mọi route không phải API/PHP → index.html) ───────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Deny hidden files (.env, .git...) ────────────────────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ── Logs ────────────────────────────────────────────────────────────────
    access_log /var/log/nginx/tiendo-access.log;
    error_log  /var/log/nginx/tiendo-error.log;
}
