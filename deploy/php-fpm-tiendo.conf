; ─────────────────────────────────────────────────────────────────────────────
; TienDo — PHP-FPM 8.2 pool riêng
; File này đặt tại: /etc/php/8.2/fpm/pool.d/tiendo.conf
; (Tắt pool www mặc định nếu không dùng: đổi [www] → listen = /run/php/php8.2-fpm.sock
;  hoặc comment file /etc/php/8.2/fpm/pool.d/www.conf)
; ─────────────────────────────────────────────────────────────────────────────

[tiendo]
user  = www-data
group = www-data

; Socket riêng cho TienDo — không đụng PHP 7.4 projects cũ
listen = /run/php/php8.2-fpm-tiendo.sock
listen.owner = www-data
listen.group = www-data
listen.mode  = 0660

; Process manager
pm                   = dynamic
pm.max_children      = 10
pm.start_servers     = 2
pm.min_spare_servers = 1
pm.max_spare_servers = 4
pm.max_requests      = 500

; Timeout cho PDF processing (Python subprocess)
request_terminate_timeout = 180s

; Environment variables
env[APP_ENV]  = production
env[APP_ROOT] = /var/www/tiendo

; Logs
php_admin_value[error_log]  = /var/log/php8.2-tiendo-error.log
php_admin_flag[log_errors]  = on
php_admin_value[memory_limit] = 256M
php_admin_value[upload_max_filesize] = 60M
php_admin_value[post_max_size]       = 60M
